<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôle Musée - Maquette</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #f4f6f9;
            padding: 50px;
        }
        h1 { color: #333; }
        .btn {
            display: inline-block;
            width: 200px;
            padding: 20px;
            margin: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        #btn-hopital { background-color: #e74c3c; } 
        #btn-maison { background-color: #2ecc71; }   
        #btn-eteindre { background-color: #7f8c8d; } 
    </style>
</head>
<body>

    <h1>Contrôle de la Maquette du Musée</h1>
    <p>Cliquez sur un bouton pour allumer ou éteindre chaque bâtiment :</p >

    <button class="btn" id="btn-hopital" onclick="allumerHopital()">🏥 Allumer Hôpital</button>
    <button class="btn" id="btn-maison" onclick="allumerMaison()">🏠 Allumer Maison</button>
    <br>
    <button class="btn" id="btn-eteindre" onclick="eteindreTout()">❌ Éteindre Tout</button>

    <script>
        // CONFIGURATION DE TON NOUVEAU FIREBASE
        const firebaseConfig = {
            databaseURL: "https://projet-avec-2led-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Change UNIQUEMENT l'hôpital à 1 (ne touche pas à la maison)
        function allumerHopital() {
            database.ref('/').update({
                hopital: 1
            });
        }

        // Change UNIQUEMENT la maison à 1 (ne touche pas à l'hôpital)
        function allumerMaison() {
            database.ref('/').update({
                maison: 1
            });
        }

        // Remet bien les deux à 0 en même temps
        function eteindreTout() {
            database.ref('/').update({
                hopital: 0,
                maison: 0
            });
        }
    </script>
</body>
</html>
